title: "Continuum Neural Momentum Eigenstate for Variationally Solving Quasiparticles"
authors: "David D. Dai, Marin Soljačić"
abstract: "We design the first neural quantum state for continuum particles that, for any chosen allowed momentum k, is by construction an exact eigenstate of total momentum with eigenvalue k. Our architecture, EVE, enables off-the-shelf VMC to solve for momentum-sector ground states. We test EVE on 2D bosons with mutual 1/r interactions, finding that a single unified ansatz is capable of describing four qualitatively different states: superfluid, roton, crystal, and phonon. At different densities, we extract the underlying phase of matter from the dispersion's shape. At rs=20.0, we see the roton minimum at finite k expected of a superfluid. At rs=100.0, we see striking zone folding indicative of crystalline order, with periodically spaced minima representing floating crystals connected by phonon arcs in between. Using density-density correlation functions, we confirm the phase diagnoses and probe the excitations' correlation structures. Finally, we analyze the roton's phase texture and find unexpected multi-particle phase strings, formed when several vortex dipoles merge, leaving two vortices connected by a phase slip."
