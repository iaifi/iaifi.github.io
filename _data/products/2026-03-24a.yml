title: "The Environments of Luminous Fast Blue Optical Transients: Evidence for a Compact Object and Wolf-Rayet Star Merger Origin"
authors: "Anya E. Nugent, V. Ashley Villar, Brian D. Metzger, Christopher L. Fryer, Eric Burns, Alexa Gordon, Danielle Frostig, Yuxin Dong"
abstract: "We present a comprehensive analysis of the host galaxies of 11 luminous fast blue optical transients (LFBOTs). We model new and archival host photometry and spectroscopy with Prospector. We determine that all LFBOT hosts are actively star-forming with recent bursts of star formation and have a median stellar mass of log(M∗/M⊙)=9.61+0.74−1.61, present-day star formation rate SFR=0.99+14.85−0.95~M⊙~yr−1, and gas-phase oxygen abundance metallicity 12+log(O/H)=8.59+0.18−0.22. To contextualize these results, we compare them to the host properties of Hydrogen-poor superluminous supernovae (SLSNe-I), several core-collapse supernova subtypes (CCSN; SNe Ibc, II, and Ibn) and long gamma-ray bursts (LGRBs). We find that LFBOT hosts are more star-forming than CCSN hosts, but less star-forming than SLSN-I hosts. We further show that LFBOT hosts are more metal-poor than SN Ibc and II hosts, but more metal-rich than SLSN-I and LGRB hosts. Finally, we find that, similar to SLSNe-I and unlike CCSNe and LGRBs, a large fraction of LFBOTs occur in their hosts' faintest pixel or outside their host galaxy's light. Our results indicate that LFBOTs have a massive stellar origin that do not trace active star-forming regions within their hosts and have a weaker metallicity-dependence than other extreme transients. For these reasons, we favor a compact-object and Wolf-Rayet star merger progenitor scenario over other previously proposed models, such as tidal disruption events and failed or successful CCSN. Future discoveries of LFBOTs with the Rubin observatory will help to increase their sample size and place firmer constraints on their environments and progenitors."
