title: "Harmonic Analysis of the Instanton Prepotential"
authors: "Rafael Álvarez-García, Fabian Ruehle"
abstract: "Discrete symmetries of Calabi-Yau moduli spaces, generated by isomorphic flops, constrain the instanton expansion of the 4D =2 Type~IIA prepotential. We show that the Coxeter-invariant functions into which the prepotential organizes are eigenfunctions of a Laplace-Beltrami operator built from the Coxeter-invariant symmetric bilinear form on the moduli space. This means that the Gromov-Witten expansion can be interpreted as a superposition of waves propagating on the Coxeter quotient of the moduli space, and its resummation is the corresponding spectral decomposition. For the dihedral Coxeter groups, separation of variables in the eigenvalue equation explains from first principles why special modified Bessel functions, ordinary Bessel functions and Jacobi theta functions appear as the natural building blocks of the prepotential, depending on whether the Coxeter rotation acts hyperbolically, elliptically, or parabolically. The resulting spectral representations converge efficiently in the interior of the moduli space, complementing the standard large-volume instanton expansion."
