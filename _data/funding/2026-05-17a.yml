title: Pritzker Prize for AI in Science Research Excellence
funder: University of Chicago and Caltech
post-date: 2026-05-17
deadline: 2026-06-30
expire: 2026-07-01
link: https://datascience.uchicago.edu/research/ai-science/partnerships/pritzker-prize/
details: "Established in 2024, the Pritzker Prize for AI in Science Research Excellence recognizes contributions that jointly advance AI and the natural sciences or engineering. We award the prize to individual scientists or research teams for outstanding research or other contributions in AI and the natural sciences or engineering. The Pritzker Prize may be awarded for a single notable achievement or for a collection of such achievements."
