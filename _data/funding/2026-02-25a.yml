title: MIT Generative AI Impact Consortium (MGAIC), Call for Proposals
funder: MGAIC
post-date: 2026-02-25
deadline: 2026-04-02
expire: 2026-04-03
link: https://genai.mit.edu/proposals/
details: "The MIT Generative AI Impact Consortium invites Principal Investigators (faculty, PRS, SRS) from across MIT to submit proposals for innovative projects proposing to study high impact uses of generative AI models. The goal of the consortium is to enable deep engagement with leading companies across a range of industry sectors to produce results of both practical and fundamental relevance focused on uses, benefits, and challenges of Generative AI. Current founding consortium member companies include: Analog Devices, Coca-Cola, InterSystems, Open AI, SK Telecom, Tata, and TWG Global Holdings. This call seeks to foster interdisciplinary collaboration, accelerate impactful research, and advance our understanding of generative AI’s transformative potential across diverse domains."
