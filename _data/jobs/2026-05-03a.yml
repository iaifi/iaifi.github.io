details: "We are seeking a skilled and innovative Senior AI Research Scientist to join a new team focusing on agentic video and multimodal reasoning systems. As a research scientist at Axon you will play a crucial role in developing AI solutions that transform both the enterprise and public safety domains and support our company’s mission: accelerate justice, protect truth, and save lives. You will advance the state-of-the-art in machine learning and multimodal technology and apply your research findings to create new responsible AI capabilities for Axon products. You will collaborate with product managers, engineers and cross-functional teams to train models and develop cutting-edge algorithms and solutions that enable intelligent perception and understanding of visual and multimodal data."
