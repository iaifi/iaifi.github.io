details: "You will work on projects on Adaptive Intelligence contributing to the development of sustainable and transparent AI systems. Your will carry out research and publish your findings in top machine-learning conferences. You are also expected to help in teaching courses, help with the management of the group, supervise masters and PhD students, and help the group in acquiring funding. The position is meant to further the careers of early-career researchers who wish to pursue a career in academia.<BR>The following qualifications are required:<BR>University science degree (PhD)<BR>Must have publications in machine-learning conferences (NeurIPS, ICML, AISTATS, ICLR, UAI, etc.)<BR>Must have expertise in at least two of the following areas: machine learning, Bayesian methods, statistics, optimization, deep learning, computer vision, reinforcement learning, natural language processing, high performance computing, AI ethics and/or philosophy<BR>Very good written and spoken English skills. Must have good communication skills, especially for scientific writing in English<BR>Excellent programming skills, experience with large models is a plus<BR>Experience with design and execution of scientific experiments, as well as visualization, documentation, and reporting of experimental results<BR>Experience with performance evaluation of machine learning systems<BR>Ability to cooperate in a dynamic and interdisciplinary research environment<BR>Ability to work both independently and in a team, as well as a high degree of motivation and proactive behaviour."
