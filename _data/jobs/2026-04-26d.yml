details: "Reporting to the Data Science Manager — Algorithmic Justice Specialist and collaborating closely with our DevOps Engineering Team, Product Manager for Discovery, and Algorithmic Justice Fellow, the Data Scientist II, NLP Specialist, will support development and evaluation work for high-priority, carefully scoped projects using NLP to support the ACLU’s mission. In this role, the NLP Specialist will be responsible for evaluating proposed uses of generative AI and non-generative natural language AI systems, providing recommendations on whether AI tooling is appropriate or ill-suited for various tasks, and when appropriate, contributing to the development and implementation of AI-based solutions to support the organization’s mission."
