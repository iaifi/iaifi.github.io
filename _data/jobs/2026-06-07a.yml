details: "Lea Frermann’s research group recently moved to the University of Tübingen, one of Europe’s most vibrant hubs for artificial intelligence research. We are hiring two postdoctoral researchers (m/f/d, E 13 TV-L, 100% each) for a fixed term of 2 years, with option to extend. We work at the intersection of natural language processing (NLP) and the cognitive and social sciences, studying principles of representation and communication across humans and machines. Our work combines theory-driven research with state-of-the-art computational methods from machine learning and NLP."
