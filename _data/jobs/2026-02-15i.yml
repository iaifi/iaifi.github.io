details: "​École Polytechnique, commonly known as “l'X”, is a world-class higher education and research institution. Supervised by the French Ministry of the Defence, École Polytechnique is a founding member of the Institut Polytechnique de Paris alongside five other institutions: ENSTA, ENPC, ENSAE, Télécom Paris, and Télécom Sud Paris. Highly international, École Polytechnique combines research, education, and innovation at the highest scientific and technological levels. With its 23 laboratories—22 of which are joint research units with the CNRS (French national center for research)—its research center works at the frontiers of knowledge on major interdisciplinary scientific, technological, and societal challenges."
