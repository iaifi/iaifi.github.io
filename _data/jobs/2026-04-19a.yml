details: "The Department of Mathematics and Statistics at the University of Maryland, Baltimore County(UMBC),  invites applications for a Post-Doctoral Research Fellowship beginning in fall 2026, preferably with an interest or focus on statistical foundations of data science, artificial intelligence and machine learning, theoretical statistics and probability, uncertainty quantification, or computational statistics. The appointment is for a fixed term, but renewable upon satisfactory performance and funding availability. Candidates should have finished their Ph.D. in statistics, biostatistics, machine learning, or a related field before their appointment start date. Successful candidates are expected to conduct research, collaborate with faculty members, and apply for external funding. An option for teaching classes in addition to the above responsibilities also exists."
