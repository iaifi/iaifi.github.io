details: "The postdoc position is also offered for three years and open to candidates with a PhD degree in Computer Science or another relevant field. The postdoc’s duties will be to characterise the spectrum of false information used by LLMs at different stages of their life cycle, in order to develop mitigation methods and prevent false information attacks on LLMs. The ideal candidate would thus have an educational background, prior research or work experience on Natural Language Processing, LLM Security, and/or Explainable AI.The postdoc will work with Isabelle Augenstein and Pepa Atanasova, and also collaborate with the larger project team."
