details: "As a Computer Vision & 3D Perception Researcher/Engineer, you will be at the forefront of core architecture development. You will design, train, and scale deep learning models that synthesize dense 3D environments from vast, heterogeneous datasets. Leveraging cutting-edge computer vision techniques such as Gaussian Splatting and Semantic Segmentation, you will develop the foundational systems that allow PerceptAI to reconstruct and comprehend the real world at an unprecedented scale. In particular, you will design and pioneer deep learning architectures optimized for 3D perception, bridging the gap between raw visual inputs and structured, scenegraph representations of the world."
