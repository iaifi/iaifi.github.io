details: "We're working toward an AI scientist — a system capable of the long-horizon reasoning and experimental judgment needed to push the scientific frontier. We believe frontier AI, developed safely, can meaningfully accelerate progress across science, engineering, and beyond. Getting there requires close collaboration with people who have spent years working in these domains. The Anthropic STEM Fellows Program brings students and experts from STEM domains into Anthropic for a few months to work alongside our research teams. Fellows pair deep domain expertise with our frontier models and internal tooling to evaluate, improve, and apply Claude's capabilities in their field. We're looking for Fellows across all different science and engineering domains. Prior machine learning experience is helpful but not required — scientific judgment and a willingness to learn quickly matter more."
