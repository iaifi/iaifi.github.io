details: "We invite applications for a Postdoctoral Research Associate in machine learning based in the School of Informatics, University of Edinburgh. The postholder will also be formally affiliated with the EPSRC-funded Hub in Generative AI and work with Drs Siddharth N. and Michael Gutmann as part of the Hub. This is an outstanding opportunity to conduct methodological research at the frontier of machine learning and to collaborate across a vibrant national network of leading universities and industry partners. The scope of the project will be defined together with the candidate and tailored to their strengths and interests but will broadly focus on one or both of the following topics:<BR>Mutual information estimation and maximisation for continuous and discrete variables, with application to cross-modal data analysis or experimental design and active learning. This work stream will build on papers [1, 2].<BR>Probabilistic latent variable modelling with hierarchically structured continuous and discrete variables for more efficient and effective generative modelling [3,4] and uncertainty quantification, with application to diffusion models [5]."
