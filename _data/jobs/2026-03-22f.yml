details: "We are pleased to announce two tenure-track faculty positions in Robotics and Artificial Intelligence at ENSTA, located on the Paris-Saclay campus. Each selected candidate will hold a prestigious Hi! PARIS Chair, awarded following evaluation by an international scientific advisory board. These Chairs come with competitive hiring packages, dedicated funding for three years, and access to world-class computational and experimental resources. The recruited faculty members will work at the U2IS Laboratory (Unité d’Informatique et d’Ingénierie des Systèmes), which is recognized for its strong research record in human-robot interaction, computer vision, autonomous systems, and learning-based robotics. Start date: September 2026"
