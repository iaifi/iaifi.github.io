details: "We are seeking highly motivated PhD Students and Postdoctoral Researchers to join the PEARL Lab (https://pearl-lab.com) at TU Darmstadt, Germany, led by Prof. Georgia Chalvatzaki. Our research focuses on structured robot learning and embodied AI. We aim to enable robots to perceive, reason, and act in open-ended environments by leveraging the underlying structure of robot–environment systems. Our approach moves beyond black-box policies toward composable, adaptive, and robust behaviors that generalize across tasks, supporting grounded, language-guided decision-making and intuitive human-robot interaction."
