details: "As a Research Engineer for VLM, you will be at the forefront of core architecture development, bridging the gap between language, vision, and 3D geometry. You will design, train, and scale large vision-language models optimized for spatial reasoning, semantic grounding, and situational awareness. Leveraging cutting-edge multi-modal AI, you will develop the foundational models that allow PerceptAI to not just see the world, but deeply comprehend its spatial layouts, 3D scenegraphs, and agentic possibilities at an unprecedented scale."
