details: "We’re hiring PhD students and postdocs to develop machine‑learning methods that make sense of human complexity. Fully funded for 4 years. Starting as soon as possible.Current ML methods often fall short when applied to human behavior. At the Human-Centered Artificial Intelligence Lab (Bielefeld University), we’re building the foundations: collecting rich behavioral data, identifying the gaps in existing algorithms, and developing new approaches to bridge them. We’re looking for computer‑science researchers with strong mathematical and analytical skills to tackle challenging problems at the intersection of computer science and psychology. If you’re passionate about models, optimization and careful algorithm design, and want to advance machine learning for complex human data, this position is for your: https://jobs.uni-bielefeld.de/job/view/4722/research-position-m-f-d-predoc-or-postdoc-in-human-centered-artificial-intelligence?page_lang=en."
