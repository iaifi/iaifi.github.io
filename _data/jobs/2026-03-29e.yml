details: "The Human-Centered Artificial Intelligence Lab seeks motivated candidates with a background in Computer Science (or a related discipline) for a fully funded researcher position (PhD/PostDoc) for 4 years. Our interdisciplinary team develops AI methods to analyze social signals, such as facial expressions, gaze, vocal cues, and heart rate, to improve mental health and enhance human – AI interaction. Collaborating with psychological and medical institutes worldwide, we use advanced machine learning, audio, and image processing techniques to support clinical diagnostics and behavioral research. Committed to AI fairness and explainability, we aim to create algorithms and tools that are both scientifically robust and ethically sound."
