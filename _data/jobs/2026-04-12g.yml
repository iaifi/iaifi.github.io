details: "Center for Artificial Intelligence (CAIRO); We are looking for a committed personality with excellent theoretical and practical experience in the field of AI infrastructure to represent the field in applied research and teaching. You will be responsible for establishing a nationally and internationally visible research group focussing on research- and application-related AI infrastructure issues. These include topics like<br>Training and inference of distributed systems<br>Development of cloud-native infrastructure<br>AI operationalisation (“MLOps”)<br>Efficient data storage, management, and connection<br>Latency or resource restrictions in AI applications<br>Hardware implementations on graphics processing units."
