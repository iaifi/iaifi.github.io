details: "The Kempner AI Fellows Program is for bachelor’s or master’s recipients ready to contribute to ambitious AI/ML research. Fellows work with Kempner investigators on active projects spanning foundation models, AI systems, NeuroAI, computational neurobiology, and cellular and protein computational biology. The program is designed for early-career researchers with strong technical preparation in modern machine learning. Fellows deepen their research experience through hands-on work in collaborative scientific projects."
