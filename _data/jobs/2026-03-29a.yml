details: "Dear all, I am recruiting a Postdoc to join my lab in New York City! You will work closely with leading experts in Machine Learning and Medical Imaging at Weill Cornell Medicine and Cornell Tech, be situated in the heart of New York City, and help build the next generation of life-saving technology. <BR>Minimum qualifications <BR>- A Ph.D. in Computer Science or related fields. <BR>- At least three first author publications in Machine Learning and Computer Vision venues, such as NeurIPS, ICLR, ICML, TMLR, IEEE TPAMI and / or Medical AI venues, such as MICCAI, MIDL, MEDIA, MELBA, and IEEE TMI, IEEE JBHI. <BR>- Desire to translate machine learning research into meaningful applications that positively impact lives of thousands of people."
