details: "Polymathic AI  is inviting applications for postdoctoral researchers in our team. Our research focuses on building and understanding foundation models for science, and in particular modeling complex interconnected systems from astronomy, biology, fluid dynamics to solar physics. For this position, we are looking for postdoctoral researchers that will contribute to our research on interpretability, generalization and general understanding of foundation models. The overarching objective is to create open access tools that enable researchers to reach meaningful understanding of the complex model quickly thus speeding up the pace of scientific discovery.<br>The research involves using new Adaptive Intelligence methods for AI4Science. This will involve close collaboration with the Adaptive Bayesian Intelligence group in Tokyo (RIKEN AIP) and Germany (TU Darmstadt). It is ideal for people who want to live in New-York but also spend time in Tokyo/Germany. Rolling aplications."
