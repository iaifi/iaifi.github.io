details: "Are you looking for a postdoctoral position at one of Europe’s leading research institutes? I’m excited to announce that I am looking for two talented postdoctoral researchers to join the MAGNET team at Inria in Lille, France, through the Marie Sklodowska-Curie Actions (MSCA) Postdoctoral Fellowship. The fellows will work on one of the following research directions:<BR>Safe and Secure Large Language Models and Agentic AI<BR>Privacy-preserving Large Language Models and Agentic AI<BR>Limiting the proliferation of Deepfakes and Misinformation.<br>Being awarded an MSCA Postdoctoral Fellowship is highly prestigious and opens many future opportunities in both academia and industry. Combined with a postdoc at Inria, it gives strong visibility and valuable experience. On top of that, the salary and benefits are very competitive. At Inria, the MAGNET team provides a friendly and collaborative environment, which we believe is essential for doing meaningful and impactful research.<br>If this opportunity interests you, please send your CV, research proposal, and motivation letter to raouf.kerkouche@inria.fr by April 30, 2026 at 23:59 CEST."
