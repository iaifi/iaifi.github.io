details: "Professor: Kenji Doya<BR>The Neural Computation Unit pursues the dual goals of developing robust and flexible learning algorithms and elucidating the brain’s mechanisms for robust and flexible learning. Our specific foci are on reinforcement learning for a biological or artificial agent learns novel behaviors in uncertain environments by exploration and reward feedback, and dynamic Bayesian inference for grasping the state of theenvironment by combining model-based predictions and sensory evidence. We combine top-down, theoretical approaches and bottom-up, experimental approaches to achieve these goals. We are recruiting research staff for revealing how the brain works and creating brain-inspired adaptive systems. We specifically invite applications to the following research topics:<BR>Developing learning algorithms for optical quantum neural networks<BR>reference https://arxiv.org/abs/2506.16147
