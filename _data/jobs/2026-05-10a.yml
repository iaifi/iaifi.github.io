details: "We are willing to support a candidate with demonstrated experience in machine learning, who is eager and passionate about applying it to psychological science and able to work with a high degree of independence. Candidates with a PhD in computer science, data science, computational linguistics, or a PhD in psychology with a strong computational background are especially welcome. The project revolves around the development and validation of predictive models using language data applied to the psychological field. The project will (1) build on existing datasets already collected at i-psi-tec for validation purposes and (2) combine computational modelling with ecological momentary assessment methods, bridging the gap between data science and real-world clinical application, advancing personalized approaches to mental health assessment. We are also open to other proposals."
