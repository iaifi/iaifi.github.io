details: "The Natural Language Understanding Lab at UTN [1] in Nuremberg, Germany, invites applications for a full-time postdoctoral research position (A13/E13 on the German TV-L scale). The position is based in the Department Computer Science & Artificial Intelligence and will be available from 1 July 2026 for an initial period of three years. The position is part of an award-winning research group focusing on implicit and underspecified language, background knowledge in language understanding as well as biases in data, tasks and models. The successful applicant will have the opportunity to develop their own research agenda, support ongoing research and teaching in the group, and collaborate with other groups at the university, including colleagues from the Department Liberal Arts & Social Sciences. Applicants should have a completed PhD in Natural Language Processing or Computational Linguistics as well as a track record of publications in *ACL venues, with a particular interest in semantics and/or pragmatics. They should be able to work in a team and communicate in English (German proficiency is not required)."
