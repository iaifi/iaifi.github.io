details: "We invite applications for a Postdoctoral Research Assistant (PDRA) to join a research project funded by the EPSRC as part of an UKRI – Japan Grant. The post holder will report to Prof Gesine Reinert who is an investigator on the project. The post holder will work under the joint supervision of Prof Gesine Reinert and Dr Wenkai Xu (Warwick). The post holder is a member of a wider UKRI-Japan research programme on theoretical and practical aspects for reliable learning procedures for human-centred AI. The post holder provides guidance to junior members of the research group including project students and PhD students. This post is fixed-term for 2 years, to start no later than 1 January 2027. Applicants will have, or be close to completion of a PhD, together with relevant experience in the area of probability of statistical machine learning. They will possess sufficient specialist knowledge in network analysis and uncertainty quantification in machine learning and have the ability to manage their own academic research and associated activities. They will have excellent communication skills, including the ability to write for publication, and represent the research group at meetings."
