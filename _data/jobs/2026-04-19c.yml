details: "Open Style Lab (OSL) is initiating a disability-led virtual research residency at the intersection of AI, fashion, and personal style from July 11 - November 13, 2026. Applications are now open and will be closing on May 1st. Apply through the links below or email us at hello@openstylelab.org to find out more. Calling for:<br>Disabled Lead Fellow (Lived experience of disability, experienced leadership in the disabled community)<br>Fashion Design / Fashion Technologist Fellow (Garment construction, manufacturing, metadata, product page reality)<br>Fashion Curation & History Fellow (context, representation, and narrative integrity)<br>AI Specialist Fellow (AI behaviour, risks, quick wins, AI ethics)<br>Research Fellow (Methodology, synthesis support, and research framing)<br>Communications / Data Visualization Fellow (Educational visual design, quick outputs through synthesis)."
