details: "Fully funded 3-year postdoctoral fellowship at Stanford Mineral-X, advised by Prof. Jef Caers, in collaboration with KoBold Metals, developing and deploying new methods for critical mineral exploration and resource definition. The scholar will develop and apply AI, muon tomography, seismic imaging, and geophysical inversion methods to discover and characterize copper, nickel, lithium, cobalt, and rare earth deposits using real exploration data from active field programs. More information here: https://postdocs.stanford.edu/postdoc-admins/policy/funding-rates-and-guidelines."
