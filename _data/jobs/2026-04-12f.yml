details: "EU Project CEREBRA-AI;A unified framework for continual, explainable and embodied General-Purpose Artificial Intelligence.<br>1. Requirements to apply: Having a degree, masters or PhD in computer engineering, computer science, data science or related (Math, statistics, Industrial or electrical engineering). Alternatively: extensive experience in AI.<br>2. The salary for this position is approx. 3k EUR and 3.5k EUR brute, monthly for PhD and Postdoc positions respectively.<br>3. Both positions are NOT remote,  and require relocation to Granada, Spain to work on site at DaSCI institute, University of Granada. Travel for project meetings is expected and research collaboration visits to other project partners are possible.<br>4. The duration of the project is 4 years, and the contracts around 46-47 months (with a trial period of few months).<br>5. Apply as soon as possible, the official project start date is 1st June.<br>DEADLINE: Please apply here asap, and ideally before mid may 2026 (reviews on a rolling basis)."
