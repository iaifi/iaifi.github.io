details: "All applicants must have a primary, full-time faculty appointment at Harvard University and must be paid by, and run their research operation through, Harvard. The sole exception are faculty paid directly by HHMI who would otherwise meet all of the criteria. Individuals with hospital-based appointments or research operations and/or non-profit, independent corporations are not eligible. The application is open only to ladder faculty members (assistant professors, associate professors, and professors) with principal investigator rights at a Harvard school.."
