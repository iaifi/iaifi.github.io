details: "High performance computing environments are increasingly complex, and scientific AI workloads demand faster, more reliable operations support. This internship project will design and prototype agentic AI capabilities that improve HPC operational efficiency at NERSC, including natural-language interfaces for operational data, intelligent assistance for troubleshooting and incident triage, and automated synthesis of system-health and performance insights. This work will support the HPC ecosystem that underpins the DOE Genesis Mission AI-for-Science workloads.The program is open to graduate students and undergraduate juniors/seniors. Applicants apply directly to project mentors — so if you're interested in the agentic AI project, feel free to reach out or apply through the provided link."
