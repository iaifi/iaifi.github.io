details: "As an ML Engineer at Pruna AI, you will bridge the gap between cutting-edge research and real-world application. Your mission is to identify the most promising AI models released by the community and industry, apply a combination of internal and external efficiency methods and to make them more efficient, and deploy them to be used by end users.<br>You’ll be at the forefront of operationalizing our research, ensuring that users can benefit from state-of-the-art models without the heavy costs of deployment. This is a hands-on role combining deep ML expertise with practical engineering skills."
