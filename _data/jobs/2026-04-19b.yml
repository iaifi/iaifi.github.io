details: "In the Institute of Informatics at the University of Munich (LMU), Germany, a position as a Research Assistant at the postdoctoral level is to be filled at the earliest possible date. The position is connected to the Research Training Group METEOR (https://rtg-meteor.de) and associated with the Chair of Artificial Intelligence and Machine Learning (https://www.kiml.ifi.lmu.de/index.html). It is intended for two years with a possibility for further extension. Payment is at the level of E13 according to the German federal wage agreement scheme (TV-L).<br>Your application material should include the following:<br>-- Cover letter with your motivation for applying<br>-- CV including a synopsis of the PhD thesis and a list of publications<br>-- Certificates (PhD, Bachelor/Master) including transcript of grades<br>-- Letter(s) of reference or contact persons<br>Please upload an electronic version of your application in a SINGLE PDF file at application link<br>For questions and further information, please contact Prof. Eyke Hüllermeier (eyke@lmu.de)."
