details: "​The Idiap Research Institute is looking for a Research Scientist to conduct research in AI for sustainability and leverage the potential of AI in the specific context of Valais – a Swiss alpine region known for its natural resources and local economic activity. The position has a level of responsibility of an early career independent group leader. While we envision this role to be full-time, we are open to exploring flexible working arrangements. Additional information: Start date: July 2026 or as soon as possible. Full consideration will be given to applications submitted before the end of March. Screening of applications will commence in April. Your application should include a full CV (including a list of publications and externally funded projects), a research statement, and the names and contact emails of three references."
