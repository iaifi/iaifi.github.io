details: "The Idiap Research Institute is looking for a Research Scientist to conduct research in foundational machine learning, who would be interested in translating these advances into impactful solutions across application domains or data modalities (e.g. language, vision, audio, video, graphs, time-series). The position has a level of responsibility of an early career independent group leader. While we envision this role to be full-time, we are open to exploring flexible working arrangements."
