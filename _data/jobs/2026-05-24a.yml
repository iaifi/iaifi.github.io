details: "We are seeking to recruit a researcher to join AIchemy’s Research Theme I (Human-in-the-Loop). This role is at the cutting edge of autonomous robotic chemistry, focusing on the development of embodied AI agents capable of working seamlessly alongside human scientists. You will lead research into learning-based robot manipulation to advance the capabilities of autonomous robotic chemists. This interdisciplinary position sits at the intersection of robotics, machine learning, and sustainable chemistry. You will join a vibrant research environment at the University of Liverpool, building upon our team's recent high-impact publications. This work is supported by prestigious grants, including a Royal Academy of Engineering Research Fellowship and an EPSRC New Investigator Award, offering significant opportunities for collaboration on aligned projects."
