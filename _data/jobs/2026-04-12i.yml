details: "Polymathic AI  is inviting applications for researchers in our team. Our research focuses on building and understanding foundation models for science, and in particular modeling complex interconnected systems from astronomy, biology, fluid dynamics to solar physics. For this position, we are looking for researchers that will contribute to our research on interpretability, generalization and general understanding of foundation models. The overarching objective is to create open access tools that enable researchers to reach meaningful understanding of the complex model quickly thus speeding up the pace of scientific discovery.<br>Fulfilling this objective requires creativity to combine core-principles of machine learning to the practical tools of deep learning, now available through modern foundation models. For the theory part, the selected candidate will work in close collaboration with the Adaptive Bayesian Intelligence group headed by Dr. Emtiyaz Khan at RIKEN-AIP (in Tokyo, Japan) and TU Darmstadt (in Germany). The candidate is expected to make the best use of adaptive-learning methods to develop practical tools to the most pressing scientific challenges in science. The collaboration may require some amount of travelling to Japan and Germany. Rolling aplications."
