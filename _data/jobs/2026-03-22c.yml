details: "The CIRCLE group at Imperial is seeking highly motivated and talented Postdoctoral Research Associates (PostDocs), who have demonstrated competence in conducting cutting-edge research. The positions are fully funded in the context of Prof. Birdal’s UKRI Future Leaders Fellowship, and focus on the design, development, and application of topological and geometric machine learning techniques, with a view to solving complex problems in areas ranging from 3D generative models to modelling molecules and physical systems. Successful candidates will be involved in projects exploring novel ways to incorporate topological structures into deep learning pipelines, contributing to both theoretical advancements and practical applications. To this end, the project integrates state-of-the-art knowledge from different disciplines such as algebraic topology, differential geometry, machine learning, and computer vision."
