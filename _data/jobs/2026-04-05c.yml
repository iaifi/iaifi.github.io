details: "The successful candidate will contribute to and lead research efforts in AI and ML for particle and astro-particle physics, and will play an important role in defining the research agenda of the group. The candidate is expected to supervise PhD candidates and postdoctoral researchers within the AI/ML group, to deepen the impact of AI/ML in the Nikhef science programs through collaborative R&D efforts, and to advance the frontier of AI/ML in particle and astroparticle physics through participation in international collaborative efforts and policy initiatives. The candidate is expected to be proactive in the procurement of science funding on AI/ML related topics and to participate in the organization of AI/ML education and training for Nikhef scientists.<BR>Requirements<BR>Applicants are expected to have a PhD degree in physics, computer science or a closely related field, a demonstrated multi-year record of outstanding and impactful research in AI/ML for (astro)particle physics, and a track record of successful supervision of PhD candidates and postdocs. Applicants are expected to have proficient communication and presentation skills, both verbal and written."
