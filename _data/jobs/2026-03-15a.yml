details: "The School of Computer Science at the University of Bristol is seeking to grow our thriving and talented AI community by hiring two new AI faculty members. We have a long-standing track record for world-leading AI, and recent successes place us at the forefront of UK AI research and teaching. Bristol hosts Isambard AI, the UK’s national AI supercomputing facility, leads two of the UK’s nine UKRI National AI Research Hubs (in Collective Intelligence and Information Theory), runs back-to-back UKRI Centres for Doctoral Training in Interactive AI and Practice-Oriented AI, and has recently launched an innovative undergraduate degree in Computer Science with AI."
