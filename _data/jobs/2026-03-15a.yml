details: "We are Top 10 for CS Research in the UK and Top 10 for CS Teaching in all four of the UK's THES, Guardian, Times and Complete University Guide rankings (alongside only Oxbridge and Imperial). We host Isambard AI, the UK's national AI supercomputing facility, two back-to-back UKRI Centres for Doctoral Training in Interactive AI and Practice-Oriented AI, and lead two of the UK's nine UKRI National AI Research Hubs (in Information Theory for AI and AI for Collective Intelligence).<br>Our faculty have joint positions with Google DeepMind and Amazon and pursue research across a wide range of AI topics (including Agents, Causal Inference, Computer Vision, Machine Learning, Reasoning, Reinforcement Learning and Artificial Life) with applications in key areas such as healthcare, commerce, ecology, and smart home technologies - and we are running new AI degrees at undergraduate and masters level and teaching AI to all via a new free online course in AI Fundamentals."
