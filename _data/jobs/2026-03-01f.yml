details: "We are looking for people of international visibility to strengthen the Computer Science Department with independent research and teaching profiles in the field of Foundations of Artificial Intelligence. The field of Artificial Intelligence is broadly construed here, with subfields such as Deep Learning, Causal AI, Natural Language Processing, Generative Models, World Models, (Neuro-)Symbolic AI, Knowledge Representation and Reasoning, Planning and Search, Agentic AI, Embodied AI, and Reinforcement Learning. The successful candidate will not only enrich the Computer Science Department; but also foster cooperation in research and teaching with related disciplines."
