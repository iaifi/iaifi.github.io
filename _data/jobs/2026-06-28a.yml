details: "We are seeking to recruit a postdoctoral researcher to work on the project 'DeceptionWeb: Foundations for Emergent Deception in Human-AI Interaction', funded by a UCPH Convergence Grant and led by Pepa Atanasova (Computer Science), Ingo Zettler (Copenhagen Center for Social Data Science and Department of Psychology), and Egor Starkov (Economics). The project's goal is to build a foundational framework for understanding emergent deception in human-AI interaction by uniting behavioural-psychological, economic-strategic, and machine learning perspectives."
