type: postdoc
title: Research Assistant/Fellow in Computational Statistics and Machine Learning
employer: The Department of Statistical Science at UCL, University College London, London, UK
post-date: 2026-06-14
deadline:
expire: 2026-07-14
link: "The post is an exciting opportunity for a researcher with a background in mathematics, statistics or machine learning who would like to grow that skill set further. They will build hands on experience in developing novel computational tool to enable the use of large-scale models and will have the opportunity to develop their expertise on dissemination of research. The postholder will be expected to join, and be an active member in, the Fundamentals of Statistical Machine Learning research group. This post is funded by the Engineering and Physical Sciences Research Council, grant EP/Y022300/1 and applicants are recommended to look at the grant description. In addition, further details on Prof Briol’s work on this topic to date can be found on the following webpage. The post is funded for 8 months and available from the 1st of January 2027, although an earlier start date may be possible subject to approval from the funder. The role is suitable at either Research Assistant level (grade 6B; i.e. an applicant with an MSc degree) or Research Fellow level (grade 7; i.e. an applicant with a PhD degree)."
