details: "Are you interested in applying for the prestigious MSCA Postdoc Fellowship at the University of Oslo working in my team? Then send me a message.<BR>Our current line of research:<BR>Trustworthy AI (AAAI26, ICLR25)<BR>Deep Learning (ICML25)<BR>Learning Theory (JMLR24)<BR>LLMs and Reasoning Models (ICLR26)<br>Emotion Recognition and Co-creative AI (ICLRW26).<br>Ali Ramezani-Kebrya, Associate Professor in Machine Learning, University of Oslo<br>Research Theme Leader, Norwegian Centre for Knowledge-driven Machine Learning (Integreat)<br>Principal Investigator, TRUST – The Norwegian Centre for Trustworthy AI<br>MishMash Centre for AI and Creativity<br>European Laboratory for Learning and Intelligent Systems (ELLIS) Member<br>https://alirk.github.io/."
