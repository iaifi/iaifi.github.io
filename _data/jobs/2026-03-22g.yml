details: "Applications are open for the AI Sentience Scholars program by Neuromatch — a 6-month, part-time, remote mentored research experience for Master's students and early postdocs. Work on frontier questions about AI, consciousness, and ethics, with leading researchers in the field. Stipend and research funding included. Learn more: neuromatch.io/ai-sentience-scholars. We're also hosting a free application webinar on 1 April (16:00 UTC), for prospective applicants to learn more about the program and ask questions. We strongly encourage interested candidates to attend before applying. Register here: https://us06web.zoom.us/webinar/register/WN_z9g1Ut7DQM6N3asbVO97aw#/registration"
