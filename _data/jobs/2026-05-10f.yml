details: "TThis role is an opportunity to work at the frontier of agentic AI, foundation models, scientific workflows, and high-performance computing, and contribute to the Department of Energy’s Genesis mission. We are looking for a creative and collaborative staff scientist/engineer who wants to develop novel methods and systems for AI agents in scientific environments and deploy them at the scale required by real scientific challenges. You will join the AI group—a highly collaborative, multidisciplinary environment and work alongside experts in AI, simulation, computer science, applied mathematics, and domain science."
