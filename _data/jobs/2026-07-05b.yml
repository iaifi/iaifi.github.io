details: "The UKP Lab, led by Prof. Dr. Iryna Gurevych, is one of Europe’s leading groups in Natural Language Processing and is recruiting researchers to join a highly international team at the frontier of trustworthy and applied AI. We combine fundamental research with open-source tools used worldwide (e.g., Sentence Transformers, AdapterHub), and are embedded in a rich ecosystem — ELLIS, Konrad Zuse School ELIZA, hessian.AI, and ATHENE. We are looking for outstanding researchers who want to shape how humans and AI systems work together — and ensure that they do so reliably, safely, and in the service of people."
