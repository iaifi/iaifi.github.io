details: "Leibniz University Hannover invites outstanding researchers in the field of Artificial Intelligence (AI) to apply for the following professorship. We are seeking a distinguished individual with a scientific background representing Leibniz University and the L3S AI Research Center in at least one of the following key areas of AI: Embodied AI, Neurosymbolic AI, Agentic AI, Trustworthy AI, or Generative AI, thereby further strengthening Hannover as an AI hub."
