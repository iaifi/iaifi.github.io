details: "We are seeking a skilled and innovative Senior Research Scientist to join one of our AI teams focusing on computer vision and machine learning (CVML). As a research scientist at Axon you will play a crucial role in developing AI solutions that transform both the enterprise and public safety domains and support our company’s mission: accelerate justice, protect truth, and save lives. You will advance the state-of-the-art in CVML and multimodal technology and apply your research findings to create new responsible AI capabilities for Axon products. You will collaborate with product managers, engineers and cross-functional teams to train models and develop cutting-edge algorithms and solutions that enable intelligent perception and understanding of visual data."
