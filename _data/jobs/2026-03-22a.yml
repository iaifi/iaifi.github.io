details: "The Paris Brain Institute (https://parisbraininstitute.org/) invites expressions of interest from internationally recognized senior and mid-career researchers in the fields of AI, data science and computational sciences to address key challenges in brain health and neuroscience. This expression of interest is part of a strategic effort to anticipate future recruitment opportunities and shape a future recruitment call. The Institute is currently exploring the launch of a formal recruitment call in Fall 2026, with potential appointments starting in Fall 2027. The potential offer could typically comprise a “Director of Research” position at CNRS, subject to institutional approval and competitive recruitment procedures, together with a competitive salary complement, and an attractive start-up package to enable the development of a new research team. The application is a lightweight process: please submit a full academic CV and a 1-page letter describing your interest in joining the Paris Brain Institute and your overall research vision through the platform. All submissions will be treated confidentially. Application deadline: Expressions of interest should be submitted no later than June 15th, 2026, 23h59 CET. Earlier submissions are highly encouraged as reviewing will be performed on a rolling basis."
