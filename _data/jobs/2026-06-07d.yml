details: "The Institute of Cognitive Science (ICS) at the University of Colorado Boulder anticipates hiring a full-time Growth and Community Lead to support the scaling of our AI for education products. In this position, you will work closely with the leadership team to create and identify opportunities to bring our products into classrooms and districts, and engage in activities to help support the implementation of our products at scale."
