details: "Samuel Kaski’s two-part research lab in ELLIS Institute Finland  (Probabilistic Machine Learning, Aalto University) and the Centre for AI Fundamentals in University of Manchester, is searching for postdocs and doctoral students to work on AI fundamentals in exciting projects. The work includes collaboration within ELLIS Institute Finland, the Finnish Center for Artificial Intelligence (FCAI),  with the rest of ELLIS, and researchers from other fields. Samuel Kaski is Professor of Computer Science in Aalto University and Professor of AI in the University of Manchester. He is the Director of  ELLIS Institute Finland and the Finnish Center for Artificial Intelligence . His research group develops machine learning principles and methods focusing on a few key topics, often working with researchers of other fields in new exciting applications (see currently available  topics below)."
