details: "Dr. Raouf KERKOUCHE is looking for two talented postdoctoral researchers to join the MAGNET team at Inria in Lille, France, through the 𝗠𝗮𝗿𝗶𝗲 𝗦𝗸ł𝗼𝗱𝗼𝘄𝘀𝗸𝗮-𝗖𝘂𝗿𝗶𝗲 𝗔𝗰𝘁𝗶𝗼𝗻𝘀 (𝗠𝗦𝗖𝗔) 𝗣𝗼𝘀𝘁𝗱𝗼𝗰𝘁𝗼𝗿𝗮𝗹 𝗙𝗲𝗹𝗹𝗼𝘄𝘀𝗵𝗶𝗽. The fellows will work on one of the following research directions: Safe and Secure Large Language Models and Agentic AI, Privacy-preserving Large Language Models and Agentic AI, or Limiting the proliferation of Deepfakes and Misinformation."
