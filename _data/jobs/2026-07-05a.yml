details: "The early career group leader positions are especially suited for researchers, either directly after completing their PhD or with some postdoctoral experience. A finished PhD is mandatory to start (but not to apply). The positions run for 6 years (with an interim evaluation after 3 years), with a salary according to the German public sector (E14 TV-L). The positions come with a guaranteed fallback option to a permanent Staff Scientist position (E13; with a regular teaching load), following a positive final evaluation. Group leaders receive funding for one PhD student as well as start-up and running costs."
