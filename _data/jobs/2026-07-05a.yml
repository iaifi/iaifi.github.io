details: "The Cluster of Excellence "Machine Learning" at Uni Tübingen is currently looking for Early Career Research Group Leaders in Machine Learning for Science. These positions are particularly well suited for researchers either right after their PhD or with some postdoctoral experience — so if you've been thinking about taking the next step toward leading your own group, this could be a great fit! What makes this especially appealing is the combination of a long contract, intellectual freedom to pursue your own research agenda, and a built-in safety net. We would be particularly happy to receive more female applicants or applicants from underrepresented groups!"
