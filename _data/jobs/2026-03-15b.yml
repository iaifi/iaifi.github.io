details: "​The Undergraduate Summer Internship Program in AI/ML Research & Engineering at the Kempner Institute offers a structured opportunity for current undergraduates (interns) and recent graduates to further their experience in AI/ML engineering. The program is designed to provide college students with a hands-on learning experience supporting AI/ML research in an academic setting. Interns will be mentored by a member of the Kempner Institute Research & Engineering Team and will work on a Kempner Institute research project under the leadership of one of the Institute’s faculty.<br>Projects for summer 2026 include: ML Systems Engineering in Scalable Brain Simulation: The Big Little Brain (BLB) project at Kempner Institute develops a scalable computational framework to simulate how brain-inspired neural representations support learning, memory, and adaptive behavior in controlled virtual environments. The intern will help engineer large-scale computational systems that simulate learning, memory, and adaptive behavior in brain-inspired models and the opportunity to learn about complex systems. This includes implementing reinforcement learning agents, modular neural network architectures, building configurable virtual environments, and constructing scalable training and evaluation pipelines, within a broader modular system design framework. The work combines hands-on coding, ML engineering, system (and others).<br>Requirements: The program is fully on-site, in person, at the Kempner Institute located at Harvard’s Science and Engineering Complex (SEC) at 150 Western Avenue, Allston, MA. Remote work is not possible in this position. Applicants must be legally eligible to work in the United States. Visa sponsorship is not available for this position. "
