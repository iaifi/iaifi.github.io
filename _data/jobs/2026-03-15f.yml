details: "Two positions for University Assistant (Pre-Doc) are available at the Institute of Structural Engineering of the TU Wien, within the Research Unit of Structural Mechanics and Dynamics. The positions are expected to start immediately (one for 40 hours per week and one for 30 hours per week), each with a fixed term of approximately 4 years. The TU Wien is Austria's largest research and educational institution in the field of technology and natural sciences. More than 4,000 scientists are researching "technology for people" in five main research areas at eight faculties. The content of the studies offered is derived from the excellent research. More than 26,000 students in 62 degree programmes benefit from this. As a driver of innovation, TU Wien strengthens the business location, facilitates cooperation and contributes to the prosperity of society."
