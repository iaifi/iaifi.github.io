details: "At the Institute for Structural Engineering, in the research area of ​​structural mechanics and structural dynamics, two positions as university assistants (pre-docs) are available, presumably starting immediately (one position with 40 hours per week and one position with 30 hours per week, each limited to approximately 4 years) with the following area of ​​responsibility. Your tasks: Participation in research and teaching tasks as well as examinations/ Student supervision/ Research and project activities/ Deepening scientific knowledge/ Writing a dissertation and publications/ Participation in scientific events/ Assistance with organizational and administrative tasks."
