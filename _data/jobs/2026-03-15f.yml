details: "​The Vienna University of Technology (TU Wien) is Austria's largest research and educational institution in the fields of technology and natural sciences, and for more than 200 years has made an indispensable contribution to securing the international competitiveness and innovative strength of Austria as a research location. Under the motto "Technology for People," around 26,000 students and more than 4,000 researchers at TU Wien conduct research, teaching, and innovation in this spirit. The Institute for Visual Computing and Human-Centered Technology , in the research area of ​​Computer Vision, is seeking to fill a position as a University Assistant (Pre-Doc), expected to start in April 2026 (30 hours per week, limited to approximately 4 years) with the following responsibilities."
