details: "At the Institute for Structural Engineering, in the research area of ​​structural mechanics and structural dynamics, two positions as university assistants (pre-docs) are available, presumably starting immediately (one position with 40 hours per week and one position with 30 hours per week, each limited to approximately 4 years) with the following area of ​​responsibility. Your tasks:<br>-Participation in research and teaching tasks as well as examination<br>-Student supervision<br>-Research and project activities<br>-Deepening scientific knowledge<br>-Writing a dissertation and publications<br>-Participation in scientific events<br>-Assistance with organizational and administrative tasks."
