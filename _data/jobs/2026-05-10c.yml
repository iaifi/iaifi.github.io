details: "The successful candidate will conduct research on methods that improve the usefulness, reliability, and scientific performance of large-scale AI models after pretraining, while also advancing the systems and software needed to run these methods efficiently on cutting-edge supercomputers and emerging AI platforms. This role offers the opportunity to contribute both fundamental advances in machine learning and high-impact scientific applications while working in a multidisciplinary environment with experts in AI, simulation, computer science, applied mathematics, and domain science."
