details: "This is an opportunity to work at the frontier of AI for science and the Department of Energy Genesis mission, where large-scale machine learning, scientific data, simulation, and leadership-class supercomputers come together to enable new modes of discovery across physics, materials science, chemistry, biology, climate, energy, and related fields. We are looking for a creative and collaborative scientist who is excited to develop, scale, and evaluate post-training methods, including reinforcement learning, preference optimization, adaptation, and alignment techniques, for scientific AI models and workflows."
