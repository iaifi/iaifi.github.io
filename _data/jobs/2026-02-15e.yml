details: "​As a Senior Scientist, you will lead and execute on projects to design, develop, and apply innovative AI technologies, including machine learning, deep learning, generative AI, and foundation models, to tackle complex challenges in the energy sector. Your work will span the entire research spectrum, from fundamental theoretical and empirical investigations to prototyping and solution development. You will shape priorities, define problem worth solving, and work on diverse projects with applications in power generation, renewable energy, electric grids, robotics, manufacturing, and internal business processes. You will collaborate with multiple stakeholders from GE Vernova's business units and a broad network of researchers across disciplines and domains. Additionally, you will contribute to cutting-edge research programs with external partners in academia and government, driving the advancement of AI research at GE Vernova and pushing the boundaries of human scientific understanding globally."
