details: "​The Idiap Research Institute is looking for a Research Scientist to conduct research in foundational machine learning, who would be interested in translating these advances into impactful solutions across application domains or data modalities (e.g. language, vision, audio, video, graphs, time-series). The position has a level of responsibility of an early career independent group leader. While we envision this role to be full-time, we are open to exploring flexible working arrangements. Additional information: Start date: July 2026 or as soon as possible. Full consideration will be given to applications submitted before the end of March. Screening of applications will commence in April. Your application should include a full CV (including a list of publications and externally funded projects), a research statement, and the names and contact emails of three referees."
