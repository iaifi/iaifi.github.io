details: "The University of Toronto is pleased to announce the third call for applications for the Eric and Wendy Schmidt AI in Science Postdoctoral Fellowship, a program of Schmidt Sciences, which brings together the brightest minds who have completed a PhD in the natural sciences or engineering and who aim to pursue a research project that includes the application of artificial intelligence (AI) to their domain. The program will fund cutting edge applications of AI in the natural sciences and engineering and create a community of interdisciplinary leaders.<br>Applicants must demonstrate clear expertise and promise within their field of study. Experience with AI is not a requirement, but applicants must have a desire to learn new AI methodologies that stand to accelerate discoveries in their domain. These Fellowships will fund research and provide training in AI and related computational skills to support new directions in the application of AI."
