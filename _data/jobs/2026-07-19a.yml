details: "The Department of Physics and Astronomy at the University of New Mexico (UNM) invites applications for one or more Research Scientist/Postdoctoral positions to contribute to a research program applying artificial intelligence and machine learning across several domains of physics and astronomy. The successful candidates will develop an integrated image-processing pipeline and apply it to three distinct problems: rare-event searches in particle detectors (e.g. the Migdal effect and neutrino-less double beta decay), component separation in images of strong gravitational lenses, and transient identification in interferometric radio astronomy. The positions offer an unusual opportunity to develop methods that generalize across experimental particle physics, cosmology, and radio astronomy."
