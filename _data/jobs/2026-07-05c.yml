details: "The Department of Computer Science wishes to appoint a new Lecturer, Senior Lecturer, or Reader (Assistant/Associate Professor) in AI and machine learning. All research areas will be considered. We particularly encourage applications that focus on Natural Language Processing, Reinforcement Learning, or AI Security/Assurance/Verification. This is a permanent position with no tenure process. The start date is flexible. Applications will be evaluated on a rolling basis. We will continue to receive applications until the position is filled."
