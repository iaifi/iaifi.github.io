details: "The Ubiquitous Knowledge Processing (UKP) Lab at the Technical University of Darmstadt, led by Prof. Iryna Gurevych, is hiring a Postdoctoral Researcher in AI/ML with a focus on Natural Language Processing. The position is anchored in the ERC Advanced Grant InterText, whose vision is to advance the next generation of language technology built on the rich network of relationships between multimodal documents — moving beyond document-level AI/NLP toward models that read, reason, and act across collections of evidence."
