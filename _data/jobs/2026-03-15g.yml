details: "The Institute for Visual Computing and Human-Centered Technology , in the research area of ​​Computer Vision, is seeking to fill a position as a University Assistant (Pre-Doc), expected to start in April 2026 (30 hours per week, limited to approximately 4 years) with the following responsibilities. Your tasks:<br>-Participation in research and teaching tasks as well as examinations<br>-Student supervision<br>-Research and project activities<br>-Deepening scientific knowledge<br>-Writing a dissertation and publications<br>-Participation in scientific events<br>-Assistance with organizational and administrative tasks."
