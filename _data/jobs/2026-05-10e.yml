details: "This is an opportunity to work at the frontier of AI for science and the Department of Energy Genesis mission, where large-scale machine learning, scientific data, simulation, and leadership-class supercomputers come together to enable new modes of discovery. You will join the AI group - a highly collaborative, multidisciplinary environment and work alongside experts in AI, simulation, computer science, applied mathematics, and domain science.If you are excited by building real systems, improving developer workflows, deploying services at scale, and supporting mission-driven research, this is a unique opportunity to contribute to one of the world’s leading computing environments."
