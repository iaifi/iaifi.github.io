details: "As part of his strategic development in AI, data science and computational science, the Paris Brain Institute has opened a call for Junior group leaders.This junior call corresponds to a formal recruitment procedure. The Junior Group Leader will be recruited for five years, as a principal investigator, with a competitive salary. They will be awarded an attractive start-up package for kick-starting their group. For more details, please refer to the call content and application platform: https://institut-du-cerveau.wiin.io/en/applications/call-for-juniorgroupleaders. Application deadline for Junior Group Leaders: April 26th, 2026, 23h59 CET."
