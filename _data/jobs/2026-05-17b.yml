details: "We are seeking to recruit a postdoctoral researcher within Natural Language Processing to work on the project “A Mechanistic Framework for Mitigating the Susceptibility of LLMs to Learning False Information” funded by Independent Research Foundation Denmark, led by Isabelle Augenstein and Pepa Atanasova. The project goal’s will be to develop a novel theoretical frameworks for LLM security, new mechanistic interpretability methods, and new evaluation protocols, developed through research at the intersection of Natural Language Processing, LLM Security, and Explainable AI. The postdoc’s duties will be to characterise the spectrum of false information used by LLMs at different stages of their life cycle, in order to develop mitigation methods and prevent false information attacks on LLMs. In addition to the PIs and the postdoctoral researcher, the team also includes a postdoctoral researcher, as well as the opportunity to apply as an academic collaborator with NVIDIA as part of an existing relationship. The postdoc’s duties will also to a smaller degree include teaching and supervision."
