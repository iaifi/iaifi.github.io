details: The Faculty of Engineering – Joint Departments of Electrical & Computer Systems Engineering and Mechanical & Aerospace Engineering is seeking a Lecturer / Senior Lecturer with expertise in robotics, autonomous systems, mechatronics, advanced sensing & control, advanced/additive manufacturing, automation, or biomedical engineering. We are looking for a candidate who will establish and lead a strong research program in these areas, driving innovations in core enabling technologies that underpin a wide range of real-world applications, including autonomous vehicles, robotic manipulation, assistive technologies, robot learning, physical AI, defence, aerospace, human-centered technologies, healthcare, soft robotics, and next-generation intelligent machines.
