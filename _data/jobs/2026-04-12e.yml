details: "An exciting postdoctoral position in method development for spatio-temporal medical data is available in the UiT Machine Learning Group at the Department of Physics and Technology. Goal: Develop new deep learning algorithms for spatio-temporal medical image analysis with particular focus on learning from limited labelled data.<br>Start date: Fall 2026<br>Duration: The appointment is for 3 years<br>It is a prerequisite that the applicant can carry out the project over the full course of the employment period. No person may hold more than one fixed term position as a Postdoctoral Research Fellow at the same institution. The workplace is at UiT in Tromsø. You must be able to start in the position within 6 months after receiving the offer. For further information about the position and UiT is available by contacting the principal supervisor and project leader Associate Professor Kristoffer Wickstrøm:<br>phone: +47 77623216<br>email: kristoffer.k.wickstrom@uit.no."
