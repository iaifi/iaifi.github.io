details: "As a Physics x AI Research Scientist, you will explore and build the next generation of scalable, generalizable physics-aware foundation models. We actively welcome candidates from a broad range of backgrounds—including fluid dynamics, electromagnetics, electrical engineering, systems engineering, and biological domains such as protein folding—who are passionate about encoding physical, biological, or engineering priors into modern AI systems. You’ll focus on architectures (especially transformers) that move beyond the limitations of narrow, hard-coded models into robust solutions that generalize across geometries, conditions, and disciplines."
